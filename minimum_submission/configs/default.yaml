project:
  name: stat-learn-project
  random_seed: 42

dataset:
  uci_id: 464
  target: critical_temp
  feature_count: 81

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  artifacts: artifacts
  models: artifacts/models
  figures: reports/figures
  tables: reports/tables
  report: reports/report.tex
  final_notebook: notebooks/final_submission.ipynb
  preliminary_notebook: notebooks/preliminary_main.ipynb

split:
  test_size: 0.2
  random_state: 42

cross_validation:
  folds: 5
  n_jobs: -1

evaluation:
  metrics:
    - mse
    - rmse
    - mae
    - r2

models:
  ridge_alphas:
    - 0.0001
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    - 100.0
  lasso_alphas:
    - 0.0001
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
  knn_neighbors:
    - 3
    - 5
    - 7
    - 11
    - 15
    - 21
    - 31
  hist_gradient_boosting:
    learning_rate: 0.06
    max_iter: 350
    max_leaf_nodes: 31
    l2_regularization: 0.01
    validation_fraction: 0.1
    n_iter_no_change: 20
